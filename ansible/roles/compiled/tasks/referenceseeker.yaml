- name: Install ReferenceSeeker
  vars:
    referenceseeker_dir: "{{ bio_dir }}/referenceseeker"
    referenceseeker_module_dir: "{{ bio_modules }}/referenceseeker"
    url: "{{ item.url }}"
    version_number: "{{ item.version_number }}"
    checksum: "{{ item.checksum }}"
    install_dir: "{{ referenceseeker_dir }}/{{ version_number }}"
    unzipdir: "/dev/shm/referenceseeker-{{ version_number }}"
    python_path: "{{ item.python_path }}"
    mummer_module: "{{ item.mummer_module }}"
    mash_module: "{{ item.mash_module }}"
    pipfile_prefix: "Pipfiles/referenceseeker.{{ version_number }}"
  tags:
    - never
    - referenceseeker{{ item.version_number }}
  block:
    - name: Install ReferenceSeeker {{ version_number }}
      block:
        - name: Download, compile and install ReferenceSeeker {{ version_number }}
          block:
            - name: Download ReferenceSeeker {{ version_number }}
              get_url:
                url: "{{ url }}"
                dest: "{{ bio_src }}/referenceseeker-{{ version_number }}.tar.gz"
                checksum: "{{ checksum }}"
            - name: Unzip ReferenceSeeker {{ version_number }}
              unarchive:
                src: "{{ bio_src }}/referenceseeker-{{ version_number }}.tar.gz"
                dest: "/dev/shm/"
                creates: "{{ unzipdir }}"
            - name: Ensure ReferenceSeeker directory exists
              file:
                path: "{{ referenceseeker_dir }}"
                state: directory
                mode: u=rwx,g=rwx,o=rx
            - name: Move RegerenceSeeker to final location
              command: mv {{ unzipdir }} {{ install_dir }}
              args:
                creates: "{{ install_dir }}"
            - name: Copy Pipfiles
              copy:
                src: "{{ pipfiles.src }}"
                dest: "{{ pipfiles.dest }}"
              with_items:
                - {
                  src: "{{ pipfile_prefix }}.Pipfile",
                  dest: "{{ install_dir }}/Pipfile"
                }
                - {
                  src: "{{ pipfile_prefix }}.Pipfile.lock",
                  dest: "{{ install_dir }}/Pipfile.lock"
                }
              loop_control:
                loop_var: pipfiles
            - name: Create virtual environment using pipenv
              command: "{{ python_path }}/bin/pipenv sync"
              args:
                  chdir: "{{ install_dir }}"
                  creates: "{{ install_dir }}/.venv"
              environment:
                  PIPENV_VENV_IN_PROJECT: "1"
                  PIPENV_IGNORE_VIRTUALENVS: "1"


    - name: Install ReferenceSeeker {{ version_number }} module
      block:
        - name: Check module dir
          file:
            path: "{{ referenceseeker_module_dir }}"
            state: directory
            mode: u=rwx,g=rwx,o=rx
        - name: Install ReferenceSeeker module file
          template:
            src: referenceseeker.lua
            dest: "{{ referenceseeker_module_dir }}/{{ version_number }}.lua"
