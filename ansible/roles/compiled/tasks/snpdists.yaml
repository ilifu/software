- name: Install snp-dists
  vars:
    snpdists_dir: "{{ bio_dir }}/snpdists"
    snpdists_module_dir: "{{ bio_modules }}/snpdists"
    url: "{{ item.url }}"
    version_number: "{{ item.version_number }}"
    checksum: "{{ item.checksum }}"
    install_dir: "{{ snpdists_dir }}/{{ version_number }}"
    unzipdir: "/dev/shm/snp-dists-{{ version_number }}"

  tags:
    - never
    - snpdists{{ item.version_number }}
  block:
    - name: Install snp-dists {{ version_number }}
      block:
        - name: Download, compile and install snp-dists {{ version_number }}
          block:
            - name: Download snp-dists {{ version_number }}
              get_url:
                url: "{{ url }}"
                dest: "{{ bio_src }}/snpdists-{{ version_number }}.tar.gz"
                checksum: "{{ checksum }}"
            - name: Unzip snp-dists {{ version_number }}
              unarchive:
                src: "{{ bio_src }}/snpdists-{{ version_number }}.tar.gz"
                dest: "/dev/shm/"
                creates: "{{ unzipdir }}"
            - name: Build snp-dists {{ version_number }}
              command: make -j {{ ansible_processor_vcpus }}
              args:
                chdir: "{{ unzipdir }}"
            - name: Check build
              command: make check
              args:
                chdir: "{{ unzipdir }}"
            - name: Ensure Install dir exists
              file:
                path: "{{ install_dir }}/bin"
                state: directory
                mode: u=rwx,g=rwx,o=rx
                recurse: yes
            - name: Install snp-dists {{ version_number }}
              command: make PREFIX={{ install_dir }} install
              args:
                chdir: "{{ unzipdir }}"
                creates: "{{ install_dir }}/bin/snp-dists"

    - name: Install snp-dists {{ version_number }} module
      block:
        - name: Check module dir
          file:
            path: "{{ snpdists_module_dir }}"
            state: directory
            mode: u=rwx,g=rwx,o=rx
        - name: Install snp-dists module file
          template:
            src: snpdists.lua
            dest: "{{ snpdists_module_dir }}/{{ version_number }}.lua"
