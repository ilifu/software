- name: Install MUMmer
  vars:
    mummer_dir: "{{ bio_dir }}/mummer"
    mummer_module_dir: "{{ bio_modules }}/mummer"
    url: "{{ item.url }}"
    version_number: "{{ item.version_number }}"
    checksum: "{{ item.checksum }}"
    install_dir: "{{ mummer_dir }}/{{ version_number }}"
    unzipdir: "/dev/shm/mummer-{{ version_number }}"
  tags:
    - never
    - mummer{{ item.version_number }}
  block:
    - name: Install MUMmer {{ version_number }}
      block:
        - name: Download, compile and install MUMmer {{ version_number }}
          block:
            - name: Download MUMmer {{ version_number }}
              get_url:
                url: "{{ url }}"
                dest: "{{ bio_src }}/mummer-{{ version_number }}.tar.gz"
                checksum: "{{ checksum }}"
            - name: Unzip MUMmer {{ version_number }}
              unarchive:
                src: "{{ bio_src }}/mummer-{{ version_number }}.tar.gz"
                dest: "/dev/shm/"
                creates: "{{ unzipdir }}"
            - name: Configure MUMmer {{ version_number }}
              command: ./configure --prefix={{ install_dir }} --enable-python-bindings
              args:
                chdir: "{{ unzipdir }}"
                creates: "{{ unzipdir }}/Makefile"
            - name: Make MUMmer {{ version_number }}
              command: make -j {{ ansible_processor_vcpus }}
              args:
                chdir: "{{ unzipdir }}"
            - name: Install MUMmer
              command: make install
              args:
                chdir: "{{ unzipdir }}"
                creates: "{{ install_dir }}/bin/mummer"

    - name: Install MUMmer {{ version_number }} module
      block:
        - name: Check module dir
          file:
            path: "{{ mummer_module_dir }}"
            state: directory
            mode: u=rwx,g=rwx,o=rx
        - name: Install MUMmer module file
          template:
            src: mummer.lua
            dest: "{{ mummer_module_dir }}/{{ version_number }}.lua"
