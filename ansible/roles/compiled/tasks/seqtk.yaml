- name: Install seqtk
  vars:
    seqtk_dir: "{{ bio_dir }}/seqtk"
    seqtk_module_dir: "{{ bio_modules }}/seqtk"
    url: "{{ item.url }}"
    version_number: "{{ item.version_number }}"
    checksum: "{{ item.checksum }}"
    install_dir: "{{ seqtk_dir }}/{{ version_number }}"
    unzipdir: "/dev/shm/seqtk-{{ version_number }}"
  tags:
    - never
    - seqtk{{ item.version_number }}
  block:
    - name: Install seqtk {{ version_number }}
      block:
        - name: Download, compile and install seqtk {{ version_number }}
          block:
            - name: Download seqtk {{ version_number }}
              get_url:
                url: "{{ url }}"
                dest: "{{ bio_src }}/seqtk-{{ version_number }}.tar.gz"
                checksum: "{{ checksum }}"
            - name: Unzip seqtk {{ version_number }}
              unarchive:
                src: "{{ bio_src }}/seqtk-{{ version_number }}.tar.gz"
                dest: "/dev/shm/"
                creates: "{{ unzipdir }}"
            - name: Make seqtk {{ version_number }}
              command: make -j {{ ansible_processor_vcpus }}
              args:
                chdir: "{{ unzipdir }}"
                creates: "{{ unzipdir }}/seqtk"
            - name: Ensure install dir exists
              file:
                  path: "{{ install_dir }}"
                  state: directory
                  mode: u=rwx,g=rwx,o=rx
            - name: Copy seqtk {{ version_number }} to install dir
              copy:
                  src: "{{ unzipdir }}/seqtk"
                  dest: "{{ install_dir }}/seqtk"
                  mode: u=rwx,g=rwx,o=rx
                  remote_src: yes

    - name: Install seqtk {{ version_number }} module
      block:
        - name: Check module dir
          file:
            path: "{{ seqtk_module_dir }}"
            state: directory
            mode: u=rwx,g=rwx,o=rx
        - name: Install seqtk module file
          template:
            src: seqtk.lua
            dest: "{{ seqtk_module_dir }}/{{ version_number }}.lua"
